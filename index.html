<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מגן — מוניטור פרטיות</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#030508;color:#e8eaf0;font-family:'Heebo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.wrap{max-width:480px;width:100%;text-align:center;}
.logo{width:72px;height:72px;background:linear-gradient(135deg,#ff2d55,#ff6b35);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 20px;box-shadow:0 0 32px rgba(255,45,85,0.4);}
h1{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;background:linear-gradient(90deg,#fff,#ff2d55);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
p{font-size:14px;color:#3a4460;margin-bottom:32px;line-height:1.6;}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:32px;}
.stat{background:rgba(8,14,26,0.97);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:16px;}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;display:block;}
.stat-l{font-size:10px;color:#3a4460;text-transform:uppercase;letter-spacing:1px;}
.cta{display:block;padding:16px;background:linear-gradient(135deg,rgba(255,45,85,0.2),rgba(255,107,53,0.15));border:1px solid rgba(255,45,85,0.3);border-radius:14px;color:#fff;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;font-size:16px;transition:all .2s;}
.cta:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,45,85,0.3);}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">🛡</div>
  <h1>מגן</h1>
  <p>מוניטור פרטיות לאייפון — ניטור תעבורת רשת, זיהוי Proxy chains, OS ומכונות וירטואליות, וחסימת פורטים מסוכנים.</p>
  <div class="stats">
    <div class="stat"><span class="stat-n" style="color:#ff2d55">6x</span><span class="stat-l">טאבים</span></div>
    <div class="stat"><span class="stat-n" style="color:#64d2ff">40</span><span class="stat-l">בדיקות QA</span></div>
    <div class="stat"><span class="stat-n" style="color:#30d158">100%</span><span class="stat-l">Mobile Ready</span></div>
    <div class="stat"><span class="stat-n" style="color:#bf5af2">12</span><span class="stat-l">פורטים</span></div>
  </div>
  <a class="cta" href="privacy-monitor.html">▶ פתח מגן</a>
</div>
</body>
</html>
